<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የፈተና መለማመጃ</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div id="splash" class="page">
        <h1>እንኳን ወደ መርጡለ ማሪያም የፈተና መለማመጃ በደህና መጡ!</h1>
        <div class="author">አዘጋጅ፦ በረከት</div>
        <button onclick="showPage('selection')">ፈተናውን ይጀምሩ</button>
    </div>

    <div id="selection" class="page hidden">
        <h2>እባክዎ ይምረጡ</h2>
        <button onclick="showPage('student-stream')">ተማሪ</button>
        <button onclick="checkAdmin()">አስተዳደር</button>
    </div>

    <div id="student-stream" class="page hidden">
        <h2>የትምህርት ዘርፍዎን ይምረጡ</h2>
        <button onclick="selectStream('Natural')">ናቹራል ሳይንስ</button>
        <button onclick="selectStream('Social')">ሶሻል ሳይንስ</button>
        <br><br>
        <button onclick="showPage('selection')">ወደ ኋላ</button>
    </div>

    <div id="subject-list" class="page hidden">
        <h2 id="stream-title">የትምህርት አይነቶች</h2>
        <div id="subjects-container"></div>
        <br><br>
        <button onclick="showPage('student-stream')">ወደ ኋላ</button>
    </div>

    <div id="admin-panel" class="page hidden">
        <h2>የአስተዳደር ፓናል</h2>
        <input type="text" id="subjectInput" placeholder="የትምህርት አይነት (ለምሳሌ: ሒሳብ)">
        <p>ጥያቄዎችን ከ PDF ኮፒ አድርገው እዚህ ይለጥፉ:</p>
        <textarea id="bulkInput" rows="10" cols="30" placeholder="ጥያቄ (መስመር 1)
አማራጭ A (መስመር 2)
አማራጭ B (መስመር 3)
አማራጭ C (መስመር 4)
አማራጭ D (መስመር 5)"></textarea>
        <br>
        <button onclick="parseAndSaveBulk()">ጥያቄዎችን በሙሉ ይጫኑ</button>
        <br><br>
        <button onclick="showPage('selection')">ውጣ</button>
    </div>

    <div id="quiz-page" class="page hidden">
        <div id="timer">የቀረዎት ሰዓት: 60</div>
        <h2 id="q-title">ፈተና</h2>
        <p id="q-text">ጥያቄው እዚህ ይታያል...</p>
        <div id="options-container"></div>
        <br><br>
        <button onclick="showPage('subject-list')">ከፈተና ውጣ</button>
    </div>

    <div id="result-page" class="page hidden">
        <h2>የፈተና ውጤትዎ</h2>
        <p id="final-score" style="font-size: 24px; font-weight: bold;"></p>
        <button onclick="showPage('selection')">ወደ መጀመሪያው ገጽ ይመለሱ</button>
    </div>

    <script src="script.js"></script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/Martule-Exam-App/sw.js')
            .then(reg => console.log('Service Worker Registered!'))
            .catch(err => console.log('Registration Failed', err));
        });
      }
    </script>
</body>
</html>
