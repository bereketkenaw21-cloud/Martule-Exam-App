<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Practice</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div id="splash" class="page">
        <h1>Welcome to Martule Mariam Exam Practice!</h1>
        <div class="author">Developed by: Berket</div>
        <button onclick="showPage('selection')">Start Exam</button>
    </div>

    <div id="selection" class="page hidden">
        <h2>Please Select</h2>
        <button onclick="showPage('student-stream')">Student</button>
        <button onclick="checkAdmin()">Admin</button>
    </div>

    <div id="student-stream" class="page hidden">
        <h2>Select Your Stream</h2>
        <button onclick="selectStream('Natural')">Natural Science</button>
        <button onclick="selectStream('Social')">Social Science</button>
        <br><br>
        <button onclick="showPage('selection')">Back</button>
    </div>

    <div id="subject-list" class="page hidden">
        <h2 id="stream-title">Subjects</h2>
        <div id="subjects-container"></div>
        <br><br>
        <button onclick="showPage('student-stream')">Back</button>
    </div>

    <div id="admin-panel" class="page hidden">
        <h2>Admin Panel</h2>
        <label>Select Subject:</label>
        <select id="subjectSelect">
            <option value="Mathematics">Mathematics</option>
            <option value="Physics">Physics</option>
            <option value="Chemistry">Chemistry</option>
            <option value="Biology">Biology</option>
            <option value="History">History</option>
            <option value="Geography">Geography</option>
            <option value="Economics">Economics</option>
            <option value="Civics">Civics</option>
            <option value="English">English</option>
            <option value="ICT">ICT</option>
        </select>
        
        <p>Paste questions from PDF here:</p>
        <textarea id="bulkInput" rows="10" cols="30" placeholder="Question
Option A
Option B
Option C
Option D"></textarea>
        <br>
        <button onclick="parseAndSaveBulk()">Upload All Questions</button>
        <br><br>
        <button onclick="showPage('selection')">Exit</button>
    </div>

    <div id="quiz-page" class="page hidden">
        <div id="timer" style="color: red; font-weight: bold; font-size: 20px;">Time left: 60</div>
        <h2 id="q-title">Exam</h2>
        <p id="q-text">Question appears here...</p>
        <div id="options-container"></div>
        <br><br>
        <button id="next-button" onclick="nextQuestion()" disabled>Next</button>
        <br><br>
        <button onclick="showPage('subject-list')">Exit Exam</button>
    </div>

    <div id="result-page" class="page hidden">
        <h2>Your Score</h2>
        <p id="final-score" style="font-size: 24px; font-weight: bold;"></p>
        <button onclick="showPage('selection')">Back to Home</button>
    </div>

    <script src="script.js"></script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/Martule-Exam-App/sw.js')
            .then(reg => console.log('Service Worker Registered!'))
            .catch(err => console.log('Registration Failed', err));
        });
      }
    </script>
</body>
</html>
