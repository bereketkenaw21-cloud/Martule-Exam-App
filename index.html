<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>መርጡለ ማሪያም ፈተና</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div id="splash" class="page">
        <h1>እንኳን ወደ መርጡለ ማሪያም 2ኛ ደረጃ ትምህርት ቤት የፈተና መለማመጃ በደህና መጡ!</h1>
        <div class="author">አዘጋጅ፦ በረከት</div>
        <button onclick="showPage('selection')">ፈተናውን ይጀምሩ</button>
    </div>

    <div id="selection" class="page hidden">
        <h2>እባክዎ ይምረጡ</h2>
        <button onclick="showPage('student-stream')">ተማሪ</button>
        <button onclick="checkAdmin()">አስተዳደር</button>
    </div>

    <div id="student-stream" class="page hidden">
        <h2>የትምህርት ዘርፍዎን ይምረጡ</h2>
        <button onclick="selectStream('Natural')">ናቹራል ሳይንስ</button>
        <button onclick="selectStream('Social')">ሶሻል ሳይንስ</button>
        <br><br>
        <button onclick="showPage('selection')">ወደ ኋላ</button>
    </div>

    <div id="subject-list" class="page hidden">
        <h2 id="stream-title">የትምህርት አይነቶች</h2>
        <div id="subjects-container"></div>
        <br><br>
        <button onclick="showPage('student-stream')">ወደ ኋላ</button>
    </div>

    <div id="admin-panel" class="page hidden">
        <h2>የአስተዳደር ፓናል</h2>
        <select id="streamSelect">
            <option value="Natural">ናቹራል ሳይንስ</option>
            <option value="Social">ሶሻል ሳይንስ</option>
        </select>
        <input type="text" id="subjectInput" placeholder="የሳብጀክት ስም">
        <textarea id="questionInput" placeholder="ጥያቄውን እዚህ ይጻፉ"></textarea>
        <input type="text" id="optA" placeholder="አማራጭ ሀ">
        <input type="text" id="optB" placeholder="አማራጭ ለ">
        <input type="text" id="optC" placeholder="አማራጭ ሐ">
        <input type="text" id="optD" placeholder="አማራጭ መ">
        <input type="text" id="ansInput" placeholder="ትክክለኛ መልስ (ለምሳሌ: ሀ)">
        <button onclick="saveQuestion()">ጥያቄውን ይጫኑ</button>
        <br><br>
        <button onclick="showPage('selection')">ውጣ</button>
    </div>

    <div id="quiz-page" class="page hidden">
        <div id="timer">የቀረዎት ሰዓት: 60</div>
        <h2 id="q-title">ፈተና</h2>
        <p id="q-text">ጥያቄው እዚህ ይታያል...</p>
        <div id="options-container"></div>
        <br><br>
        <button onclick="showPage('subject-list')">ከፈተና ውጣ</button>
    </div>

    <script src="script.js"></script>

    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
      }
    </script>
</body>
</html>
