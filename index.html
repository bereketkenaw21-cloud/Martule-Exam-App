<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>መርጡለ ማሪያም 2ኛ ደረጃ ትምህርት ቤት</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <section id="welcome-page" class="page">
            <div class="hero">
                <i class="fas fa-user-graduate main-icon"></i>
                <h1>እንኳን ወደ መርጡለ ማሪያም 2ኛ ደረጃ ትምህርት ቤት የፈተና መለማመጃ ገፅ በደህና መጣቹህ</h1>
                <p class="creator">አዘጋጅ፡ በረከት ቀናው</p>
                <div class="main-buttons">
                    <button onclick="showPage('student-gate')" class="btn-primary">የተማሪዎች መግቢያ</button>
                    <button onclick="promptAdmin()" class="btn-admin">Admin</button>
                </div>
            </div>
        </section>

        <section id="student-gate" class="page hidden">
            <h2>የጥናት ዘርፍዎን ይምረጡ</h2>
            <div class="grid">
                <button onclick="loadSubjects('Natural')" class="card">Natural Science</button>
                <button onclick="loadSubjects('Social')" class="card">Social Science</button>
            </div>
            <button onclick="showPage('welcome-page')" class="back-link">ተመለስ</button>
        </section>

        <section id="subject-page" class="page hidden">
            <h2 id="stream-title">ትምህርት ይምረጡ</h2>
            <div id="subject-list" class="grid"></div>
            <button onclick="showPage('student-gate')" class="back-link">ተመለስ</button>
        </section>

        <section id="quiz-page" class="page hidden">
            <div class="quiz-nav">
                <div id="timer">ጊዜ፡ 01:30:00</div>
                <div id="q-counter">ጥያቄ 1/--</div>
            </div>
            <div class="question-box">
                <p id="q-text"></p>
                <div id="options"></div>
            </div>
            <div class="quiz-footer">
                <button id="next-btn" onclick="submitAnswer()" disabled>ቀጣይ</button>
            </div>
        </section>

        <section id="admin-panel" class="page hidden">
            <h2>የአስተዳዳሪ ክፍል (Admin)</h2>
            <div class="admin-grid">
                <div class="upload-section">
                    <h3>አዲስ ጥያቄ መጫኛ</h3>
                    <select id="admin-subject">
                        <option value="Mathematics">Mathematics</option>
                        <option value="Physics">Physics</option>
                        <option value="English">English</option>
                        <option value="Biology">Biology</option>
                        <option value="Chemistry">Chemistry</option>
                        <option value="Civics">Civics</option>
                        <option value="History">History</option>
                        <option value="Geography">Geography</option>
                        <option value="Economics">Economics</option>
                    </select>
                    <textarea id="raw-input" placeholder="ጥያቄዎቹን ከ PDF ኮፒ አድርገው እዚህ ይለጥፉ..."></textarea>
                    <p class="hint">ፎርማት፡ ጥያቄ? [ሀ, ለ, ሐ, መ] መልስ</p>
                    <button onclick="processAndSave()" class="btn-save">አረጋግጥና ጫን</button>
                </div>
                <div class="data-manage">
                    <button onclick="clearSystem()" class="btn-danger">ሁሉንም ዳታ አጥፋ</button>
                </div>
            </div>
            <button onclick="showPage('welcome-page')" class="back-link">ተመለስ</button>
        </section>

        <section id="result-page" class="page hidden">
            <div class="result-card">
                <i class="fas fa-poll-h"></i>
                <h2>የፈተና ውጤት</h2>
                <h1 id="score-display">0/0</h1>
                <button onclick="location.reload()" class="btn-primary">ጨርስ</button>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
