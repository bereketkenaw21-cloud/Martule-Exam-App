<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mertule Mariyam Exam System</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a73e8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main-page" class="page container">
        <div class="main-icon">🎓</div>
        <h1>እንኳን ወደ መርጡለ ማሪያም 2ኛ ደረጃ ትምህርት ቤት የፈተና መለማመጃ ገፅ በደህና መጣቹህ</h1>
        <p class="creator">አዘጋጅ፡ በረከት ቀናው</p>
        <div class="action-buttons">
            <button class="btn-primary" onclick="showPage('stream-page')">የተማሪዎች መግቢያ</button>
            <br>
            <button class="btn-admin" onclick="promptAdmin()">Admin</button>
        </div>
    </div>

    <div id="stream-page" class="page container hidden">
        <h2>የጥናት ዘርፍዎን ይምረጡ</h2>
        <div class="grid">
            <button class="card" onclick="loadSubjects('Natural')">Natural Science</button>
            <button class="card" onclick="loadSubjects('Social')">Social Science</button>
        </div>
        <button class="back-link" onclick="showPage('main-page')">ተመለስ</button>
    </div>

    <div id="subject-page" class="page container hidden">
        <h2 id="stream-display-title">Subjects</h2>
        <div class="grid" id="subject-list"></div>
        <button class="back-link" onclick="showPage('stream-page')">ተመለስ</button>
    </div>

    <div id="quiz-page" class="page container hidden">
        <div class="quiz-nav">
            <span id="q-counter">ጥያቄ 1/10</span>
            <span id="timer" style="color:red; font-weight:bold;">ጊዜ፡ 01:30:00</span>
        </div>
        <div class="question-box">
            <p id="q-text">ጥያቄ...</p>
            <div id="options"></div>
        </div>
        <button id="next-btn" class="btn-primary" onclick="submitAnswer()" disabled>ቀጣይ</button>
    </div>

    <div id="result-page" class="page container hidden">
        <h2>ውጤት</h2>
        <h1 id="score-display">0 / 0</h1>
        <button class="btn-primary" onclick="location.reload()">ተመለስ</button>
    </div>

    <div id="admin-panel" class="page container hidden">
        <h2>Admin</h2>
        <select id="admin-subject" class="option-btn" style="width:100%; padding:10px; margin-bottom:10px;">
            <option value="Mathematics">Mathematics</option>
            <option value="History">History</option>
            <option value="Geography">Geography</option>
            <option value="Biology">Biology</option>
            <option value="Physics">Physics</option>
            <option value="Chemistry">Chemistry</option>
            <option value="English">English</option>
            <option value="Economics">Economics</option>
            <option value="Civics">Civics</option>
        </select>
        <textarea id="raw-input" placeholder="ጥያቄ [መልስ1, መልስ2, መልስ3] ትክክለኛ_መልስ"></textarea>
        <button class="btn-save" onclick="processAndSave()">ጫን</button>
        <button class="back-link" onclick="showPage('main-page')">ተመለስ</button>
    </div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
